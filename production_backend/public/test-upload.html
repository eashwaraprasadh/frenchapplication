<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
</head>
<body>
    <h1>Upload Test</h1>
    <input type="file" id="fileInput">
    <button onclick="testUpload()">Upload</button>
    <div id="result"></div>

    <script>
        async function testUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                alert('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('type', 'audio');

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `Uploading ${file.name} (${(file.size / 1024 / 1024).toFixed(2)}MB)...`;

            try {
                const response = await fetch('/admin/files/upload-content', {
                    method: 'POST',
                    headers: {
                        'X-CSRF-TOKEN': 'test-token'
                    },
                    body: formData
                });

                resultDiv.innerHTML = `Status: ${response.status}<br>`;
                const text = await response.text();
                resultDiv.innerHTML += `Response: ${text.substring(0, 500)}`;
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
