; PHP Configuration for Large File Uploads
; This file may be used by some hosting providers

; File upload settings
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Execution time settings
max_execution_time = 300
max_input_time = 300

; Memory settings
memory_limit = 256M

; Other useful settings
file_uploads = On
allow_url_fopen = On
